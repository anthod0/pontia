bind_addr = "127.0.0.1:8080"
database_url = "sqlite://~/.local/share/llmparty/llmparty.db"
external_api_token = "dev-token"
run_migrations = true

[dashboard]
# Local Vite dist directory or a remote .tar.gz/.tgz/.zip archive containing exactly one index.html.
source = "apps/web/dist"
# Used only for remote sources. On startup llmparty tries to refresh this cache;
# if refresh fails, an existing cached dashboard is served.
cache_dir = "~/.cache/llmparty/dashboard"

[runtime.pi]
tui_command = "pi -e /absolute/path/to/llmparty/clients/pi"

[runtime.claude_code]
tui_command = "claude"

[workspace_browser]
roots = [
  { root_id = "projects", label = "Projects", path = "/home/me/projects" }
]
